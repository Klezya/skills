# Production nginx configuration for a Python API behind Docker.
#
# Features:
#   - TLS termination with Let's Encrypt certificates
#   - HTTP → HTTPS redirect
#   - Security headers (HSTS, X-Content-Type-Options, etc.)
#   - Rate limiting (global + stricter for auth endpoints)
#   - Request size limits and timeouts
#   - Proxy buffering for slow clients
#   - Health check endpoint with suppressed access logs
#
# Usage:
#   Mount as /etc/nginx/conf.d/api.conf in your nginx container.
#   Requires rate limit zones defined in nginx.conf http {} block (see bottom).

upstream api_backend {
    server app:8000;          # Docker service name
    # server app2:8000;       # add more for load balancing
    keepalive 32;             # persistent connections to backend
}

# ── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name api.example.com;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.example.com;

    # ── TLS ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Server Identity ──────────────────────────────────────────────────
    server_tokens off;                  # hide nginx version

    # ── Request Limits ───────────────────────────────────────────────────
    client_max_body_size 10m;           # max upload size
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ── Default Rate Limit ───────────────────────────────────────────────
    limit_req zone=api burst=20 nodelay;
    limit_req_status 429;

    # ── Auth Endpoints (stricter rate limit) ─────────────────────────────
    location /auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health Check (no access log) ─────────────────────────────────────
    location /health {
        proxy_pass http://api_backend/health;
        access_log off;
    }

    # ── Main Proxy ───────────────────────────────────────────────────────
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";         # for keepalive

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering — absorb slow clients so workers aren't tied up
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED: Add these rate limit zones to the http {} block in nginx.conf:
#
#   limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;
# ─────────────────────────────────────────────────────────────────────────────
